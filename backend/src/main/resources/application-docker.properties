# ============================================================
# SOJUS — Perfil Docker (PostgreSQL)
# Activar con: SPRING_PROFILES_ACTIVE=docker
# ============================================================

spring.application.name=sojus-helpdesk

# ---- Servidor ----
server.port=8080
server.servlet.context-path=/

# ---- Base de Datos (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://postgres:5432/${DB_NAME:sojus_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:sojus_user}
spring.datasource.password=${DB_PASSWORD:sojus_pass}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- H2 deshabilitado ----
spring.h2.console.enabled=false

# ---- JWT (sin fallback — REQUIERE variable de entorno JWT_SECRET) ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ---- CORS ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:19006}

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ---- DevTools deshabilitado en Docker ----
spring.devtools.livereload.enabled=false

# ---- Logging ----
logging.level.com.sojus=INFO
logging.level.org.springframework.security=WARN

# ---- Actuator (healthcheck para Docker) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
