# Perfil de testing para ejecución de tests de integración
# Usa H2 en memoria con base de datos limpia por cada test

# --- Base de datos H2 en memoria (aislada) ---
spring.datasource.url=jdbc:h2:mem:sojus_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# --- H2 Console desactivada en tests ---
spring.h2.console.enabled=false

# --- JWT (clave de test, no usar en producción) ---
app.jwt.secret=testSecretKeyForJwtTokenGenerationMin256Bits1234567890abcdef
app.jwt.expiration-ms=3600000

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000

# --- Logging reducido para tests ---
logging.level.root=WARN
logging.level.com.sojus=INFO
logging.level.org.springframework.security=WARN
